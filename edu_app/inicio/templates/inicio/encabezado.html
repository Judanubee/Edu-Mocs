<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %} {% endblock titulo %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">


</head>

<body>

    <header class="header">
    <div class="logo">
        EDU MOCS LOGO
    </div>

    <nav class="menu">

        <a href="{% url 'cursos' %}" class="cursos">CURSOS</a>
        <a href="{% url 'contacto' %}" class="contacto">CONTACTO</a>
        <a href="{% url 'login' %}" class="login">LOGIN</a>
    </nav>

    <div class="usuario">
        <img src="{% static 'images/user.png' %}" alt="User" class="img-usuario">
        <button class="btn-usuario"><a href="{% url 'perfil' %}">MIS CURSOS</a></button>
    </div>
</header>

    {% block contenido %}{% endblock contenido %}
</body>
</html>
