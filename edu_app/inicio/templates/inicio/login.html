{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión | Edu Mocs</title>
    <link rel="stylesheet" href="">
</head>

<body>

<div class="login-container">

    <h1>Iniciar sesión</h1>

    {% if form.errors %}
        <p class="error">
            El usuario o la contraseña son incorrectos.
        </p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="campo">
            <label for="{{ form.username.id_for_label }}">
                Usuario 
            </label>

            {{ form.username }}
        </div>

        <div class="campo">
            <label for="{{ form.password.id_for_label }}">
                Contraseña
            </label>

            {{ form.password }}
        </div>

        {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <button type="submit">
            Iniciar sesión
        </button>
    </form>

</div>

</body>
</html>
