{% extends "inicio/encabezado.html" %}

{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'registros/css/admin.css' %}">
{% endblock css %}

{% block titulo %}
    Registrar profesor
{% endblock titulo %}

{% block contenido %}

<main class="formulario-administrador">

    <h1>Registrar profesor</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Guardar profesor
        </button>
    </form>

    <a href="{% url 'panel_administrador' %}" class="regresar">
    ← Regresar al panel
    </a>

</main>

{% endblock contenido %}
